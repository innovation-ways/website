<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 340"
     width="900"
     height="340"
     style="width:100%;height:auto"
     role="img"
     aria-labelledby="rag-title rag-desc">

  <title id="rag-title">Retrieval Pipeline: How I'd Build It Today</title>
  <desc id="rag-desc">A seven-stage retrieval pipeline: Ingest, Chunk with contextual header, Embed, Hybrid Retrieve combining dense vectors and BM25, Rerank using a cross-encoder, Generate with top-k context, and Verify for faithfulness. Rerank and Verify are highlighted as the highest-value additions beyond the naive pipeline.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ═══ ROW 1 (y-centre 95): Ingest → Chunk → Embed → Hybrid Retrieve ═══
       Box height 80, box centres at y=95
       x positions: 85, 255, 415, 600  (widths: 130, 140, 110, 160)
  -->

  <!-- 1. Ingest  x=20 w=130 -->
  <rect x="20" y="55" width="130" height="80" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="85" y="90" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Ingest</text>
  <text x="85" y="111" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">docs · feeds</text>

  <!-- → -->
  <line x1="150" y1="95" x2="178" y2="95"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Chunk  x=180 w=150 -->
  <rect x="180" y="55" width="150" height="80" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="255" y="86" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Chunk</text>
  <text x="255" y="104" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">+ contextual</text>
  <text x="255" y="120" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">summary header</text>

  <!-- → -->
  <line x1="330" y1="95" x2="358" y2="95"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Embed  x=360 w=120 -->
  <rect x="360" y="55" width="120" height="80" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="420" y="90" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Embed</text>
  <text x="420" y="111" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">dense vectors</text>

  <!-- → -->
  <line x1="480" y1="95" x2="508" y2="95"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Hybrid Retrieve  x=510 w=180 -->
  <rect x="510" y="55" width="180" height="80" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="600" y="86" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Hybrid Retrieve</text>
  <text x="600" y="104" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">dense + BM25</text>
  <text x="600" y="120" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">RRF fusion</text>

  <!-- Wrap connector: step 4 right (690,95) → right to 730 → down to 195 → left to step5 right (830,195) -->
  <polyline points="690,95 730,95 730,195 802,195"
            fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ ROW 2 (y-centre 195): Rerank → Generate → Verify (right-to-left flow) ═══
       Entry from the right; arrow points left into step 5 (Rerank)
       Step 5: x=690 w=160  cx=770  right-edge=850 — entry from wrap
       Step 6: x=490 w=170  cx=575
       Step 7: x=270 w=190  cx=365
  -->

  <!-- 5. Rerank (TEAL)  x=690 w=160 -->
  <rect x="692" y="155" width="160" height="80" rx="10"
        fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <text x="772" y="188" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#0d9488">Rerank</text>
  <text x="772" y="208" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#0f766e">cross-encoder model</text>

  <!-- ← arrow (leftward) -->
  <line x1="692" y1="195" x2="664" y2="195"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6. Generate  x=480 w=170 -->
  <rect x="480" y="155" width="170" height="80" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="565" y="188" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Generate</text>
  <text x="565" y="208" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">LLM · top-k context</text>

  <!-- ← arrow (leftward) -->
  <line x1="480" y1="195" x2="452" y2="195"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7. Verify (TEAL)  x=250 w=190 -->
  <rect x="250" y="155" width="190" height="80" rx="10"
        fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <text x="345" y="188" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#0d9488">Verify</text>
  <text x="345" y="208" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#0f766e">faithfulness check</text>

  <!-- ═══ FOOTER ═══ -->
  <text x="450" y="305" text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#94a3b8">Teal stages are high-value additions beyond the naive retrieve-then-generate baseline</text>

</svg>
