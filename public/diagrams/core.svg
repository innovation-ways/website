<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 880 480"
     width="880"
     height="480"
     style="width:100%;height:auto"
     role="img"
     aria-labelledby="core-title core-desc">

  <title id="core-title">CORE: Five Cooperating On-Prem Agents</title>
  <desc id="core-desc">Architecture diagram showing an Orchestrator agent coordinating four specialised agents: Document RAG, NL to SQL, Hybrid Agent, and Code Analyzer. All run fully on-prem using local models via Ollama and PostgreSQL with pgvector.</desc>

  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <!-- Teal arrowhead marker -->
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       ORCHESTRATOR — teal left accent bar
       Box: x=290, y=30, w=300, h=90
  ═══════════════════════════════════════════════════════════ -->
  <rect x="290" y="30" width="300" height="90" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Teal left accent -->
  <rect x="290" y="30" width="6" height="90" rx="3"
        fill="#0d9488"/>
  <!-- Clip corner of accent to match rounded box -->
  <rect x="290" y="30" width="6" height="10"
        fill="#0d9488"/>

  <text x="450" y="65"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="600" fill="#1f2933">Orchestrator</text>
  <text x="450" y="86"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">Plans across agents · synthesizes with references</text>

  <!-- ═══════════════════════════════════════════════════════════
       CONNECTOR LINES — Orchestrator → each agent
       Orchestrator bottom centre: (450, 120)
       Vertical trunk down to y=175, then branches
  ═══════════════════════════════════════════════════════════ -->

  <!-- Trunk: (450,120) → (450,175) -->
  <line x1="450" y1="120" x2="450" y2="175"
        stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Horizontal rail at y=175: x=110 → x=770 -->
  <line x1="110" y1="175" x2="770" y2="175"
        stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Drop lines from rail to each agent top (y=200) -->
  <!-- Agent 1 centre-x=110, but box is x=30 w=170, so cx=115 -->
  <line x1="115" y1="175" x2="115" y2="200"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Agent 2 cx=335 -->
  <line x1="335" y1="175" x2="335" y2="200"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Agent 3 cx=555 -->
  <line x1="545" y1="175" x2="545" y2="200"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Agent 4 cx=765 -->
  <line x1="765" y1="175" x2="765" y2="200"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════
       AGENT BOXES — row at y=200, height=130
       Columns: 30 | 250 | 460 | 670   (width=200, gap=30)
  ═══════════════════════════════════════════════════════════ -->

  <!-- Agent 1: Document RAG -->
  <rect x="30" y="200" width="170" height="120" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="115" y="232"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Document RAG</text>
  <text x="115" y="256"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">Source citations</text>
  <text x="115" y="274"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">Group RBAC</text>

  <!-- Agent 2: NL → SQL -->
  <rect x="240" y="200" width="190" height="120" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="335" y="232"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">NL → SQL</text>
  <!-- "validation layer" in teal -->
  <text x="335" y="256"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="600" fill="#0d9488">Validation layer:</text>
  <text x="335" y="274"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">syntax · schema</text>
  <text x="335" y="291"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="11" font-weight="400" fill="#64748b">security · performance</text>

  <!-- Agent 3: Hybrid Agent -->
  <rect x="450" y="200" width="190" height="120" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="545" y="232"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Hybrid Agent</text>
  <text x="545" y="256"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">Pre-approved</text>
  <text x="545" y="274"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">parameterized queries</text>

  <!-- Agent 4: Code Analyzer -->
  <rect x="660" y="200" width="190" height="120" rx="10"
        fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="755" y="232"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="14" font-weight="600" fill="#1f2933">Code Analyzer</text>
  <text x="755" y="256"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">Per-file docs</text>
  <text x="755" y="274"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">from a Git repo</text>

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER CAPTION
  ═══════════════════════════════════════════════════════════ -->
  <text x="440" y="400"
        text-anchor="middle"
        font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" font-weight="400" fill="#94a3b8">100% on-prem · local models via Ollama · PostgreSQL + pgvector</text>

</svg>
